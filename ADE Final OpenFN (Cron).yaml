name: ADS Automation
jobs:
  Write-to-DHIS2-Tracker:
    name: Write to DHIS2 Tracker
    adaptor: "@openfn/language-dhis2@latest"
    body: >-
      fn(async state => {
        if (!state.patient || !state.assessment) {
          console.log('No patient or assessment — skipping.');
          return state;
        }

        const DE_ALERT_LEVEL               = 'yYC03FbRzgg';
        const DE_ALERT_SUMMARY             = 'KPLPSTV0XZn';
        const DE_RECOMMENDED_ACTION        = 'V59caCKDySM';
        const DE_SAFETY_CHECK_DATE         = 'QVPNMC9k5DW';
        const DE_TREATMENT_APPROPRIATENESS = 'JmS2VgfpSlG';
        const DE_INTERACTION_ALERT         = 'O3pjWHqRadJ';
        const DE_CONTRAINDICATION_ALERT    = 'AZFoP6efYEd';
        const DE_ADR_WARNING               = 'MsJEBMLYKgO';
        const DE_SAFETY_CHECKED            = 'SRgePliKEnM';
        const PROGRAM_UID                  = 'd4iemvqrYHO';
        const SAFETY_STAGE_UID             = 'Rxhkap8IQxZ';

        const r   = state.assessment;
        const ctx = state.patient;
        const today = r.checked_at || new Date().toISOString().slice(0, 10);

        const eventPayload = {
          program:               PROGRAM_UID,
          programStage:          SAFETY_STAGE_UID,
          orgUnit:               ctx.orgUnit,
          trackedEntityInstance: ctx.trackedEntityInstance,
          enrollment:            ctx.enrollment,
          occurredAt:            today,
          status:                'COMPLETED',
          dataValues: [
            { dataElement: DE_ALERT_LEVEL,               value: r.alert_level },
            { dataElement: DE_ALERT_SUMMARY,             value: (r.alert_summary || '').slice(0, 1200) },
            { dataElement: DE_RECOMMENDED_ACTION,        value: (r.recommended_action || '').slice(0, 1200) },
            { dataElement: DE_SAFETY_CHECK_DATE,         value: today },
            { dataElement: DE_TREATMENT_APPROPRIATENESS, value: (r.treatment_appropriateness || '').slice(0, 1200) },
            { dataElement: DE_INTERACTION_ALERT,         value: (r.interaction_alert || '').slice(0, 1200) },
            { dataElement: DE_CONTRAINDICATION_ALERT,    value: (r.contraindication_alert || '').slice(0, 1200) },
            { dataElement: DE_ADR_WARNING,               value: (r.adr_warning || '').slice(0, 1200) },
          ],
        };

        console.log(`Writing safety alert to DHIS2 for ${ctx.patient_id} — ${r.alert_level}`);
        return { ...state, eventPayload };
      });


      http.post('tracker', state => ({ events: [state.eventPayload] }));


      // ── Mark prescription event as safety-checked ─────────────────────

      fn(async state => {
        const DE_SAFETY_CHECKED = 'SRgePliKEnM';
        const ctx = state.patient;

        console.log('DHIS2 Drug Safety Alert response:', JSON.stringify(state.data).slice(0, 300));

        try {
          // Merge existing data values with the safety checked flag
          const existingDvs = (ctx.existingDataValues ?? []).filter(
            dv => dv.dataElement !== DE_SAFETY_CHECKED
          );

          await http.put(
            `${state.configuration.hostUrl}/api/events/${ctx.event}`,
            {
              program:               ctx.program,
              programStage:          ctx.programStage,
              orgUnit:               ctx.orgUnit,
              trackedEntityInstance: ctx.trackedEntityInstance,
              enrollment:            ctx.enrollment,
              status:                'COMPLETED',
              dataValues: [
                ...existingDvs,
                { dataElement: DE_SAFETY_CHECKED, value: 'true' },
              ],
            }
          );
          console.log(`Prescription event ${ctx.event} marked as safety-checked.`);
        } catch (e) {
          console.warn(`Failed to mark prescription as safety-checked: ${e.message}`);
        }

        return state;
      });
  Fetch-Recent-Prescriptions:
    name: Fetch Recent Prescriptions
    adaptor: "@openfn/language-dhis2@latest"
    body: >-
      /**
       * Job 01 — Fetch Recent Prescriptions
       * Adaptor: @openfn/language-dhis2@latest
       * Credential: DHIS2
       *
       * Polls DHIS2 for prescription events completed in the last 5 minutes
       * that have NOT yet been safety-checked (SRgePliKEnM != true).
       * Each patient may have multiple prescription stages — the flag is
       * per-event so each prescription is independently checked.
       */

      const PRESCRIPTION_STAGE_UID  = 'DjNzlXFgoxQ';

      const PROGRAM_UID             = 'd4iemvqrYHO';

      const POLL_DURATION           = '5m';

      const DE_SAFETY_CHECKED       = 'SRgePliKEnM';  // Safety Check Completed
      (Yes Only)


      const DE_DIAGNOSIS = 'VRwZifj1OUr';

      const DE_DRUG1     = 'TUpvPA4MLld';

      const DE_DRUG2     = 'ETIWseOtnkj';

      const DE_DRUG3     = 'AUdKW6pGigu';

      const DE_PREGNANT  = 'QetEHInoxjr';


      const ATTR_AGE        = 'rTTZqMtvAy8';

      const ATTR_PATIENT_ID = 'fzunsCCOgyY';


      // ── Fetch recently completed unchecked prescription events ─────────

      get(
        'events',
        {
          programStage:        PRESCRIPTION_STAGE_UID,
          program:             PROGRAM_UID,
          status:              'COMPLETED',
          lastUpdatedDuration: POLL_DURATION,
          filter:              `${DE_SAFETY_CHECKED}:ne:true`,
          fields:              '*',
          skipPaging:          true,
        }
      );


      // ── Parse events into patient objects ─────────────────────────────

      fn(async state => {
        const events = state.data?.events ?? [];
        console.log(`Fetched ${events.length} new prescription event(s)`);

        if (events.length === 0) {
          console.log('No new prescriptions — stopping.');
          return { ...state, patients: [], patient: null, assessment: null };
        }

        const patients = [];

        for (const event of events) {
          const dvMap = {};
          for (const dv of (event.dataValues ?? [])) {
            dvMap[dv.dataElement] = dv.value ?? '';
          }

          let attrMap = {};
          try {
            const teiResult = await http.get(
              `${state.configuration.hostUrl}/api/trackedEntityInstances/${event.trackedEntityInstance}?fields=attributes&program=${PROGRAM_UID}`
            );
            for (const a of (teiResult.data?.attributes ?? [])) {
              attrMap[a.attribute] = a.value ?? '';
            }
          } catch (e) {
            console.warn(`Could not fetch TEI attributes for ${event.trackedEntityInstance}: ${e.message}`);
          }

          const ageRaw     = attrMap[ATTR_AGE] ?? null;
          const age        = ageRaw !== null && ageRaw !== '' ? parseInt(ageRaw, 10) : null;
          const isPregnant = (dvMap[DE_PREGNANT] ?? '') === 'Pregnant';

          patients.push({
            event:                 event.event                 ?? '',
            trackedEntityInstance: event.trackedEntityInstance ?? '',
            enrollment:            event.enrollment            ?? '',
            orgUnit:               event.orgUnit               ?? '',
            program:               event.program               ?? PROGRAM_UID,
            programStage:          event.programStage          ?? PRESCRIPTION_STAGE_UID,
            patient_id:            attrMap[ATTR_PATIENT_ID] || event.trackedEntityInstance || 'UNKNOWN',
            age,
            isPregnant,
            pregnant:              isPregnant ? 'true' : 'false',
            diagnosis_icpc:        dvMap[DE_DIAGNOSIS] ?? '',
            drug_1:                dvMap[DE_DRUG1]     ?? '',
            drug_2:                dvMap[DE_DRUG2]     ?? '',
            drug_3:                dvMap[DE_DRUG3]     ?? '',
            // Preserve existing data values for the safety check patch in job 05
            existingDataValues:    event.dataValues    ?? [],
          });
        }

        console.log(`Parsed ${patients.length} patient(s) for processing`);
        return { ...state, patients, patient: patients[0] ?? null, assessment: null };
      });
  Resolve-Drugs-and-RxNav-Check:
    name: Resolve Drugs and RxNav Check
    adaptor: "@openfn/language-common@latest"
    body: |-
      const BY_NAME = {"AA1 - AMOXICILLIN 500MG (CAPSUL)":{"generic":"AMOXICILLIN","rxcui":"239191","confidence":"high","route":"ORAL"},"AA1 - AMOXICILLIN 500MG (TABLET)":{"generic":"AMOXICILLIN","rxcui":"239191","confidence":"high","route":"ORAL"},"AA10 - AMOXICILLIN + CLAVULANIC ACID 156MG/5ML":{"generic":"AMOXICILLIN","rxcui":"239191","confidence":"high","route":"ORAL"},"AA102 - CIPROFLOXACIN 250MG":{"generic":"CIPROFLOXACIN","rxcui":"1665210","confidence":"high","route":"AURICULAR (OTIC) | INTRAVENOUS"},"AA120 - METRONIDAZOLE 5 mg/ml, solution for infusion":{"generic":"METRONIDAZOLE","rxcui":"142046","confidence":"high","route":"INTRAVENOUS | ORAL"},"AA121 - AZITHROMYCINE 200MG/5ML, suspension, 30ml":{"generic":"AZITHROMYCIN","rxcui":"141963","confidence":"high","route":"INTRAVENOUS | ORAL"},"AA134 - BENZATHINE BENZYL PENICILLIN 2,400,000 IU":{"generic":"BENZTROPINE","rxcui":"885209","confidence":"medium","route":"ORAL"},"AA136 - AMOXICILLIN 1000MG + CLAVULANIC ACID 200 MG":{"generic":"AMOXICILLIN","rxcui":"239191","confidence":"high","route":"ORAL"},"AA19 - AMIKACIN 500MG":{"generic":"AMIKACIN","rxcui":"2059184","confidence":"high","route":"RESPIRATORY (INHALATION)"},"AA2 - AMOXICILLIN 250MG/5ML":{"generic":"AMOXICILLIN","rxcui":"239191","confidence":"high","route":"ORAL"},"AA20 - AZITHROMYCIN 250MG (CAPSUL)":{"generic":"AZITHROMYCIN","rxcui":"141963","confidence":"high","route":"INTRAVENOUS | ORAL"},"AA20 - AZITHROMYCIN 250MG (TABLET)":{"generic":"AZITHROMYCIN","rxcui":"141963","confidence":"high","route":"INTRAVENOUS | ORAL"},"AA21 - AZITHROMYCINE 200MG/5ML, suspension, 15ml":{"generic":"AZITHROMYCIN","rxcui":"141963","confidence":"high","route":"INTRAVENOUS | ORAL"},"AA22 - AZITHROMYCIN 500MG (CAPSUL)":{"generic":"AZITHROMYCIN","rxcui":"141963","confidence":"high","route":"INTRAVENOUS | ORAL"},"AA22 - AZITHROMYCIN 500MG (TABLET)":{"generic":"AZITHROMYCIN","rxcui":"141963","confidence":"high","route":"INTRAVENOUS | ORAL"},"AA24 - BENZATHINE BENZYL PENICILLIN 1,200,000IU":{"generic":"BENZTROPINE","rxcui":"885209","confidence":"medium","route":"ORAL"},"AA25 - BENZATHINE BENZYL PENICILLIN 600,000IU":{"generic":"BENZTROPINE","rxcui":"885209","confidence":"medium","route":"ORAL"},"AA26 - CEFIXIME 200MG":{"generic":"CEFIXIME","rxcui":"197451","confidence":"high","route":"ORAL"},"AA27 - CEFIXIME 100MG/5ML":{"generic":"CEFIXIME","rxcui":"197451","confidence":"high","route":"ORAL"},"AA28 - CEFIXIME 400MG":{"generic":"CEFIXIME","rxcui":"197451","confidence":"high","route":"ORAL"},"AA46 - CEFTRIAXONE SODIUM 1000MG":{"generic":"CEFTRIAXONE SODIUM","rxcui":"1665005","confidence":"high","route":"INTRAMUSCULAR | INTRAVENOUS"},"AA47 - CEFTRIAXONE SODIUM 250MG":{"generic":"CEFTRIAXONE SODIUM","rxcui":"1665005","confidence":"high","route":"INTRAMUSCULAR | INTRAVENOUS"},"AA48 - CEFTRIAXONE SODIUM 500MG":{"generic":"CEFTRIAXONE SODIUM","rxcui":"1665005","confidence":"high","route":"INTRAMUSCULAR | INTRAVENOUS"},"AA5 - AMOXICILLIN + CLAVULANIC ACID 1000MG":{"generic":"AMOXICILLIN","rxcui":"239191","confidence":"high","route":"ORAL"},"AA59 - CIPROFLOXACIN 500MG":{"generic":"CIPROFLOXACIN","rxcui":"1665210","confidence":"high","route":"AURICULAR (OTIC) | INTRAVENOUS"},"AA6 - AMOXICILLIN + CLAVULANIC ACID 625MG":{"generic":"AMOXICILLIN","rxcui":"239191","confidence":"high","route":"ORAL"},"AA60 - CLARITHROMYCIN 125MG/5ML":{"generic":"CLARITHROMYCIN","rxcui":"197516","confidence":"high","route":"ORAL"},"AA61 - CLARITHROMYCIN 250MG/5ML":{"generic":"CLARITHROMYCIN","rxcui":"197516","confidence":"high","route":"ORAL"},"AA63 - CLARYTHROMYCINE 500MG":{"generic":"CLARITHROMYCIN","rxcui":"197516","confidence":"medium","route":"ORAL"},"AA64 - DOXYCYCLINE 100MG":{"generic":"DOXYCYCLINE","rxcui":"1423080","confidence":"high","route":"INTRAVENOUS | ORAL"},"AA7 - AMOXICILLIN + CLAVULANIC ACID 457MG / 5ML":{"generic":"AMOXICILLIN","rxcui":"239191","confidence":"high","route":"ORAL"},"AA73 - GENTAMYCIN 80MG":{"generic":"GENTAMICIN","rxcui":"1870676","confidence":"high","route":"INTRAMUSCULAR | INTRAVENOUS"},"AA8 - AMOXICILLIN + CLAVULANIC ACID 312MG/ 5ML":{"generic":"AMOXICILLIN","rxcui":"239191","confidence":"high","route":"ORAL"},"AA80 - METRONIDAZOLE 500MG":{"generic":"METRONIDAZOLE","rxcui":"142046","confidence":"high","route":"INTRAVENOUS | ORAL"},"AA81 - METRONIDAZOLE 250MG":{"generic":"METRONIDAZOLE","rxcui":"142046","confidence":"high","route":"INTRAVENOUS | ORAL"},"AA82 - METRONIDAZOL 125MG/5ML":{"generic":"METRONIDAZOLE","rxcui":"142046","confidence":"high","route":"INTRAVENOUS | ORAL"},"AA83 - METRONIDAZOL 200MG/5ML":{"generic":"METRONIDAZOLE","rxcui":"142046","confidence":"high","route":"INTRAVENOUS | ORAL"},"AA85 - NITROFURANTION 100MG":{"generic":"NITROFURANTOIN","rxcui":"1648755","confidence":"high","route":"ORAL"},"AA87 - NITROFURANTION 25MG/5ML":{"generic":"NITROFURANTOIN","rxcui":"1648755","confidence":"high","route":"ORAL"},"AA91 - SULFAMETHAXAZOLE 200MG + TRIMETHOPRIM 40MG/5ML":{"generic":"SULFAMETHOXAZOLE AND TRIMETHOPRIM","rxcui":"1809083","confidence":"high","route":"INTRAVENOUS | ORAL"},"AA92 - SULFAMETHAXAZOLE 400MG+TRIMETHOPRIM 80MG":{"generic":"SULFAMETHOXAZOLE AND TRIMETHOPRIM","rxcui":"1809083","confidence":"high","route":"INTRAVENOUS | ORAL"},"AA95 - AMOXICILLIN 125MG/5ML":{"generic":"AMOXICILLIN","rxcui":"239191","confidence":"high","route":"ORAL"},"EA2 - FUROSEMIDE 40MG":{"generic":"FUROSEMIDE","rxcui":"1719286","confidence":"high","route":"INTRAMUSCULAR | INTRAVENOUS"},"EA4 - FUROSEMIDE 20MG/2ML":{"generic":"FUROSEMIDE","rxcui":"1719286","confidence":"high","route":"INTRAMUSCULAR | INTRAVENOUS"},"EA5 - HYDROCHLOROTHIAZIDE 25MG":{"generic":"HYDROCHLOROTHIAZIDE","rxcui":"197770","confidence":"high","route":"ORAL"},"EA82 - DIGOXIN 0.25MG":{"generic":"DIGOXIN","rxcui":"104206","confidence":"high","route":"INTRAMUSCULAR | INTRAVENOUS"},"EA9 - AMLODIPINE 5MG":{"generic":"AMLODIPINE","rxcui":"2184120","confidence":"high","route":"ORAL"},"EA12 - ATENOLOL 100MG":{"generic":"ATENOLOL","rxcui":"150750","confidence":"high","route":"ORAL"},"EA13 - ATENOLOL 50MG":{"generic":"ATENOLOL","rxcui":"150750","confidence":"high","route":"ORAL"},"EA39 - ENALAPRIL 10MG":{"generic":"ENALAPRIL","rxcui":"1435624","confidence":"high","route":"ORAL"},"EA40 - ENALAPRIL 20MG":{"generic":"ENALAPRIL","rxcui":"1435624","confidence":"high","route":"ORAL"},"EA41 - ENALAPRIL 5MG":{"generic":"ENALAPRIL","rxcui":"1435624","confidence":"high","route":"ORAL"},"GA11 - METFORMIN 500MG":{"generic":"METFORMIN","rxcui":"1807888","confidence":"high","route":"ORAL"},"GA12 - METFORMIN 850MG":{"generic":"METFORMIN","rxcui":"1807888","confidence":"high","route":"ORAL"},"OB4 - OMEPRAZOLE 20MG (CAPSUL)":{"generic":"OMEPRAZOLE","rxcui":"198051","confidence":"high","route":"ORAL"},"OB4 - OMEPRAZOLE 20MG (TABLET)":{"generic":"OMEPRAZOLE","rxcui":"198051","confidence":"high","route":"ORAL"},"OB5 - OMEPRAZOLE 40MG":{"generic":"OMEPRAZOLE","rxcui":"198051","confidence":"high","route":"ORAL"},"NB1 - CARBAMAZEPINE 200MG":{"generic":"CARBAMAZEPINE","rxcui":"197441","confidence":"high","route":"ORAL"},"NB2 - CARBAMAZEPINE 400MG":{"generic":"CARBAMAZEPINE","rxcui":"197441","confidence":"high","route":"ORAL"},"EA104 - WARFARIN 5MG":{"generic":"WARFARIN","rxcui":"855288","confidence":"high","route":"ORAL"},"NC15 - SERTRALINE 50MG":{"generic":"SERTRALINE","rxcui":"251201","confidence":"high","route":"ORAL"},"NC12 - FLUOXETINE 20MG (CAPSUL)":{"generic":"FLUOXETINE","rxcui":"1190110","confidence":"high","route":"ORAL"},"NC12 - FLUOXETINE 20MG (TABLET)":{"generic":"FLUOXETINE","rxcui":"1190110","confidence":"high","route":"ORAL"}};

      const BY_PARSED = {"amoxicillin":{"generic":"AMOXICILLIN","rxcui":"239191","confidence":"high","route":"ORAL"},"ciprofloxacin":{"generic":"CIPROFLOXACIN","rxcui":"1665210","confidence":"high","route":"AURICULAR (OTIC) | INTRAVENOUS"},"metronidazole":{"generic":"METRONIDAZOLE","rxcui":"142046","confidence":"high","route":"INTRAVENOUS | ORAL"},"azithromycin":{"generic":"AZITHROMYCIN","rxcui":"141963","confidence":"high","route":"INTRAVENOUS | ORAL"},"cefixime":{"generic":"CEFIXIME","rxcui":"197451","confidence":"high","route":"ORAL"},"ceftriaxone sodium":{"generic":"CEFTRIAXONE SODIUM","rxcui":"1665005","confidence":"high","route":"INTRAMUSCULAR | INTRAVENOUS"},"clarithromycin":{"generic":"CLARITHROMYCIN","rxcui":"197516","confidence":"high","route":"ORAL"},"doxycycline":{"generic":"DOXYCYCLINE","rxcui":"1423080","confidence":"high","route":"INTRAVENOUS | ORAL"},"furosemide":{"generic":"FUROSEMIDE","rxcui":"1719286","confidence":"high","route":"INTRAMUSCULAR | INTRAVENOUS"},"hydrochlorothiazide":{"generic":"HYDROCHLOROTHIAZIDE","rxcui":"197770","confidence":"high","route":"ORAL"},"digoxin":{"generic":"DIGOXIN","rxcui":"104206","confidence":"high","route":"INTRAMUSCULAR | INTRAVENOUS"},"amlodipine":{"generic":"AMLODIPINE","rxcui":"2184120","confidence":"high","route":"ORAL"},"atenolol":{"generic":"ATENOLOL","rxcui":"150750","confidence":"high","route":"ORAL"},"enalapril":{"generic":"ENALAPRIL","rxcui":"1435624","confidence":"high","route":"ORAL"},"metformin":{"generic":"METFORMIN","rxcui":"1807888","confidence":"high","route":"ORAL"},"omeprazole":{"generic":"OMEPRAZOLE","rxcui":"198051","confidence":"high","route":"ORAL"},"warfarin":{"generic":"WARFARIN","rxcui":"855288","confidence":"high","route":"ORAL"},"carbamazepine":{"generic":"CARBAMAZEPINE","rxcui":"197441","confidence":"high","route":"ORAL"},"sertraline":{"generic":"SERTRALINE","rxcui":"251201","confidence":"high","route":"ORAL"},"fluoxetine":{"generic":"FLUOXETINE","rxcui":"1190110","confidence":"high","route":"ORAL"},"nitrofurantoin":{"generic":"NITROFURANTOIN","rxcui":"1648755","confidence":"high","route":"ORAL"},"sulfamethoxazole trimethoprim":{"generic":"SULFAMETHOXAZOLE AND TRIMETHOPRIM","rxcui":"1809083","confidence":"high","route":"INTRAVENOUS | ORAL"}};

      const ICPC_MAP = {"K86":{"term":"hypertension","label":"Hypertension"},"K87":{"term":"hypertension","label":"Hypertension with complications"},"K74":{"term":"ischemic heart disease","label":"Angina pectoris"},"K75":{"term":"myocardial infarction","label":"Myocardial infarction"},"K77":{"term":"heart failure","label":"Heart failure"},"R74":{"term":"upper respiratory infection","label":"URTI"},"R75":{"term":"sinusitis","label":"Sinusitis"},"R78":{"term":"bronchitis","label":"Bronchitis"},"R96":{"term":"asthma","label":"Asthma"},"R81":{"term":"pneumonia","label":"Pneumonia"},"D73":{"term":"gastroenteritis","label":"Gastroenteritis"},"D84":{"term":"peptic ulcer","label":"Peptic ulcer"},"D85":{"term":"duodenal ulcer","label":"Duodenal ulcer"},"T90":{"term":"diabetes mellitus type 2","label":"Type 2 diabetes"},"T89":{"term":"diabetes mellitus type 1","label":"Type 1 diabetes"},"U71":{"term":"urinary tract infection","label":"UTI"},"U70":{"term":"pyelonephritis","label":"Pyelonephritis"},"W78":{"term":"pregnancy","label":"Pregnancy"},"W84":{"term":"high risk pregnancy","label":"High risk pregnancy"},"X74":{"term":"vaginal infection","label":"Vaginitis"},"A77":{"term":"malaria","label":"Malaria"},"A78":{"term":"tuberculosis","label":"Tuberculosis"},"P76":{"term":"depression","label":"Depression"},"P74":{"term":"anxiety","label":"Anxiety"},"N89":{"term":"migraine","label":"Migraine"},"N87":{"term":"epilepsy","label":"Epilepsy"},"B80":{"term":"anemia","label":"Anaemia"}};

      function parseGeneric(raw) {
        let s = raw.trim();
        s = s.replace(/^[A-Z0-9]+\s*-\s*/i, '');
        s = s.replace(/\s*\([^)]*\)\s*$/, '');
        s = s.replace(/,?\s*(suspension|solution|infusion|injection|syrup|tablets?|capsules?)\b.*/i, '');
        s = s.replace(/\s*\d[\d,.]*\s*(?:MG|MCG|G|ML|IU|%)[\w/]*/gi, '');
        return s.replace(/\s*\+\s*/g, ' ').replace(/\s+/g, ' ').trim().toLowerCase();
      }

      function lookupDrug(raw) {
        if (!raw || !raw.trim()) return null;
        const key = raw.trim();
        if (BY_NAME[key]) return { ...BY_NAME[key], strategy: 'exact_name' };
        const nameMatch = Object.keys(BY_NAME).find(k => k.toLowerCase() === key.toLowerCase());
        if (nameMatch) return { ...BY_NAME[nameMatch], strategy: 'case_insensitive' };
        const parsed = parseGeneric(key);
        if (BY_PARSED[parsed]) return { ...BY_PARSED[parsed], strategy: 'parsed_fallback' };
        return null;
      }

      fn(state => {
        if (!state.patient) {
          console.log('No patient to process — skipping.');
          return state;
        }

        const p = state.patient;

        const age = p.age;
        let ageGroup = 'unknown';
        if (age !== null) {
          if (age < 12)       ageGroup = 'paediatric';
          else if (age < 18)  ageGroup = 'adolescent';
          else if (age >= 65) ageGroup = 'elderly';
          else                ageGroup = 'adult';
        }

        const icpc      = String(p.diagnosis_icpc || '').trim();
        const diagEntry = ICPC_MAP[icpc];
        const diagTerm  = diagEntry?.term  || null;
        const diagLabel = diagEntry?.label || icpc || 'unknown';

        const rawInputs = [p.drug_1, p.drug_2, p.drug_3]
          .map(d => String(d || '').trim())
          .filter(d => d !== '');

        const resolvedDrugs = rawInputs.map(rawDrug => {
          const match = lookupDrug(rawDrug);
          return match
            ? { raw: rawDrug, generic: match.generic, rxcui: match.rxcui,
                confidence: match.confidence, strategy: match.strategy, found: true }
            : { raw: rawDrug, generic: null, rxcui: null, found: false, strategy: 'none' };
        });

        const notFound = resolvedDrugs.filter(d => !d.found).map(d => d.raw);
        if (notFound.length > 0) {
          console.warn(`[${p.patient_id}] Drugs not in formulary: ${notFound.join(' | ')}`);
        }

        return {
          ...state,
          patient: {
            ...p,
            ageGroup,
            icpc,
            diagTerm,
            diagLabel,
            resolvedDrugs,
            notFound,
            interactions: [],
          },
        };
      });

      fn(async state => {
        if (!state.patient) return state;

        const p = state.patient;

        const rxcuis = p.resolvedDrugs
          .filter(d => d.found && d.rxcui)
          .map(d => d.rxcui);

        if (rxcuis.length < 2) {
          return { ...state, patient: { ...p, interactions: [], interactionSummary: '' } };
        }

        try {
              const result = await http.get(
            `https://rxnav.nlm.nih.gov/REST/interaction/list.json?rxcuis=${rxcuis.join('+')}`
          );
          const data = result.data;

          const pairs = data?.fullInteractionTypeGroup?.[0]?.fullInteractionType || [];
          const interactions = pairs.map(pair => ({
            drug1:       pair.minConcept?.[0]?.name || '',
            drug2:       pair.minConcept?.[1]?.name || '',
            description: pair.interactionPair?.[0]?.description || '',
          }));
          const interactionSummary = interactions
            .map(i => `${i.drug1} + ${i.drug2}: ${i.description}`)
            .join(' | ');

          console.log(`RxNav found ${interactions.length} interaction(s) for ${p.patient_id}`);
          return { ...state, patient: { ...p, interactions, interactionSummary } };
        } catch (e) {
          console.warn(`RxNav lookup failed: ${e.message}`);
          return { ...state, patient: { ...p, interactions: [], interactionSummary: 'RxNav lookup failed' } };
        }
      });
  Fetch-OpenFDA-Labels:
    name: Fetch OpenFDA Labels
    adaptor: "@openfn/language-common@latest"
    body: >-
      fn(async state => {
        console.log('Job 03 — patient:', state.patient?.patient_id);
        console.log('Job 03 — resolvedDrugs:', JSON.stringify(state.patient?.resolvedDrugs));

        if (!state.patient || !state.patient.resolvedDrugs) return state;

        const p = state.patient;

        function clean(arr, maxLen = 600) {
          if (!arr?.length) return '';
          const text = Array.isArray(arr) ? arr.join(' ') : String(arr);
          const trimmed = text.replace(/\s+/g, ' ').trim();
          return trimmed.length > maxLen ? trimmed.slice(0, maxLen) + '...' : trimmed;
        }

        function extractSection(text, keywords) {
          if (!text) return '';
          const lower = text.toLowerCase();
          for (const kw of keywords) {
            const idx = lower.indexOf(kw);
            if (idx !== -1) return text.slice(idx, idx + 400).trim();
          }
          return '';
        }

        const labelResults = {};

        for (const drug of p.resolvedDrugs) {
          if (!drug.found || !drug.rxcui) {
            labelResults[drug.raw] = { labelFound: false };
            continue;
          }

          console.log(`Fetching label for ${drug.generic} (rxcui:${drug.rxcui})`);

          let labelData = { labelFound: false };
          try {
           const result = await http.get(
              `https://api.fda.gov/drug/label.json?search=openfda.rxcui:"${drug.rxcui}"&limit=1`
            );
            const record = result.data?.results?.[0];


            if (record) {
              const populations = clean(record.use_in_specific_populations, 1200);
              labelData = {
                labelFound:         true,
                warnings:           clean(record.warnings || record.boxed_warning),
                contraindications:  clean(record.contraindications),
                drug_interactions:  clean(record.drug_interactions),
                adverse_reactions:  clean(record.adverse_reactions),
                pregnancy_warning:  extractSection(populations, ['pregnancy', 'pregnant', 'labor', 'labour']),
                paediatric_warning: extractSection(populations, ['pediatric', 'paediatric', 'children', 'neonates', 'infant']),
                geriatric_warning:  extractSection(populations, ['geriatric', 'elderly', 'older patients', 'aged 65']),
              };
            }
          } catch (e) {
            console.warn(`OpenFDA fetch failed for ${drug.generic} (rxcui:${drug.rxcui}): ${e.message}`);
            console.warn('Full error:', JSON.stringify(e));
          }

          labelResults[drug.generic] = labelData;
        }

        return { ...state, patient: { ...p, labelResults } };
      });
  Claude-Safety-Assessment:
    name: Claude Safety Assessment
    adaptor: "@openfn/language-claude@1.0.23"
    body: >-
      const SYSTEM_PROMPT = `You are a clinical pharmacy advisor supporting
      prescribers in a primary healthcare setting.

      You have deep knowledge of the WHO Essential Medicines guidelines and
      AWaRe antibiotic classification.


      Your role is to:

      1. Assess prescription safety using only the drug safety data provided in
      the user message

      2. Apply WHO prescribing guidelines from the reference below

      3. Consider the patient's specific context (age, pregnancy, diagnosis) in
      all reasoning

      4. Suggest alternatives from the SARC formulary when flagging problems

      5. Be concise and actionable — prescribers have limited time


      CRITICAL CONSTRAINTS:

      - Only reference drugs and interactions present in the input data

      - Do not invent drug interactions not listed in the RxNav or FDA label
      data

      - Do not speculate beyond the available clinical data


      AWaRe antibiotic classification:

      - ACCESS (use freely): Amoxicillin, Metronidazole, Nitrofurantoin,
      Doxycycline, Sulfamethoxazole-trimethoprim

      - WATCH (second-line only): Ciprofloxacin, Azithromycin, Ceftriaxone,
      Cefixime, Clarithromycin

      - RESERVE: Carbapenems, Colistin — do NOT prescribe at PHC level


      Escalation levels:

      - Critical: high-severity interaction OR pregnant + pregnancy warning OR
      paediatric/elderly + age warning

      - Warning: moderate interaction OR contraindication OR WATCH antibiotic
      for viral indication

      - Advisory: low interaction OR AWaRe stewardship concern OR not first-line
      per WHO

      - None: no issues found


      You MUST respond ONLY with a single valid JSON object — no markdown, no
      preamble:

      {
        "alert_level": "None|Advisory|Warning|Critical",
        "alert_summary": "one sentence — most important finding",
        "treatment_appropriateness": "Yes|Caution|No — one sentence explanation",
        "interaction_alert": "max 300 chars",
        "contraindication_alert": "max 300 chars",
        "adr_warning": "key ADRs — prefix PREGNANCY WARNING or AGE WARNING if applicable, max 400 chars",
        "recommended_action": "specific actionable instruction for the prescriber",
        "alternatives": "specific alternatives from SARC formulary if needed, else N/A",
        "confidence": "High|Medium|Low",
        "confidence_reason": "one sentence if Medium or Low, else empty string"
      }`;


      // ── Step 1: Build the prompt ──────────────────────────────────────

      fn(state => {
        if (!state.patient) {
          console.log('No patient — skipping job 04.');
          return state;
        }

        const p = state.patient;
        const {
          patient_id, age, ageGroup, isPregnant,
          icpc, diagLabel,
          resolvedDrugs, notFound,
          labelResults, interactions,
        } = p;

        const patientBlock = [
          `Patient ID:   ${patient_id}`,
          `Age:          ${age !== null ? age + ' years (' + ageGroup + ')' : 'unknown'}`,
          `Pregnant:     ${isPregnant ? 'YES' : 'No'}`,
          `Diagnosis:    ${diagLabel} (ICPC-2: ${icpc})`,
        ].join('\n');

        const drugsBlock = resolvedDrugs.map((d, i) => {
          if (!d.found) return `Drug ${i+1}: ${d.raw} [NOT IN FORMULARY MAPPING]`;
          const label = labelResults?.[d.generic];
          const lines = [`Drug ${i+1}: ${d.generic} (RxCUI: ${d.rxcui})`];
          lines.push(`  Original label: ${d.raw}`);
          if (label?.labelFound) {
            if (label.contraindications) lines.push(`  Contraindications: ${label.contraindications.slice(0, 400)}`);
            if (label.warnings)          lines.push(`  Warnings: ${label.warnings.slice(0, 400)}`);
            if (label.drug_interactions) lines.push(`  Drug interactions: ${label.drug_interactions.slice(0, 300)}`);
            if (label.adverse_reactions) lines.push(`  Adverse reactions: ${label.adverse_reactions.slice(0, 300)}`);
            if (isPregnant && label.pregnancy_warning)
              lines.push(`  PREGNANCY WARNING: ${label.pregnancy_warning.slice(0, 400)}`);
            if (ageGroup === 'paediatric' && label.paediatric_warning)
              lines.push(`  PAEDIATRIC WARNING: ${label.paediatric_warning.slice(0, 400)}`);
            if (ageGroup === 'elderly' && label.geriatric_warning)
              lines.push(`  ELDERLY WARNING: ${label.geriatric_warning.slice(0, 400)}`);
          } else {
            lines.push(`  FDA label: not found in OpenFDA`);
          }
          return lines.join('\n');
        }).join('\n\n');

        let interactionsBlock = 'No drug-drug interactions found.';
        if (interactions?.length > 0) {
          interactionsBlock = interactions
            .map(ix => `${ix.drug1} + ${ix.drug2}: ${ix.description}`)
            .join('\n');
        }

        const formularyNote = notFound?.length > 0
          ? `Note: ${notFound.join(', ')} could not be mapped to OpenFDA identifiers.`
          : 'All prescribed drugs were resolved in the formulary mapping.';

        const userPrompt = `${SYSTEM_PROMPT}

      Review this prescription from a primary healthcare setting.

      Reason across all findings using the WHO guidelines provided.


      === PATIENT CONTEXT ===

      ${patientBlock}


      === PRESCRIBED DRUGS AND FDA LABEL DATA ===

      ${drugsBlock}


      === DRUG-DRUG INTERACTIONS (RxNav) ===

      ${interactionsBlock}


      === FORMULARY NOTE ===

      ${formularyNote}`;

        const checkedAt = new Date().toISOString().slice(0, 10);
        console.log(`Job 04 — building prompt for patient: ${patient_id}`);
        return { ...state, userPrompt, checkedAt };
      });


      // ── Step 2: Call Claude using the native prompt() function ────────

      prompt(
        state => state.userPrompt,
        { model: 'claude-haiku-4-5-20251001', max_tokens: 1024 }
      );


      // ── Step 3: Parse Claude response ─────────────────────────────────

      fn(state => {
        if (!state.patient) return state;

        let llmResult = {};
        let parseError = null;

        try {
          const rawText = state.data?.content?.[0]?.text || '';
          console.log('Claude raw text:', rawText.slice(0, 200));
          if (!rawText) throw new Error('Empty response from Claude');
          const cleaned = rawText.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
          llmResult = JSON.parse(cleaned);
        } catch (e) {
          parseError = e.message;
          console.warn('Claude parse failed:', parseError);
          llmResult = {
            alert_level:               'Advisory',
            alert_summary:             'Automated review incomplete — manual check required.',
            treatment_appropriateness: 'Caution — review could not be completed automatically.',
            interaction_alert:         'See raw data.',
            contraindication_alert:    'See raw data.',
            adr_warning:               'See raw data.',
            recommended_action:        'Manual clinical review required.',
            alternatives:              'N/A',
            confidence:                'Low',
            confidence_reason:         'Parse error: ' + parseError,
          };
        }

        const p = state.patient;
        const drugs_resolved = p.resolvedDrugs
          .map(d => d.found
            ? `${d.generic} (rxcui:${d.rxcui}) [${d.strategy}]`
            : `${d.raw} [NOT MAPPED]`)
          .join(' | ');

        const assessment = {
          patient_id:                p.patient_id,
          alert_level:               llmResult.alert_level            || 'Advisory',
          alert_summary:             llmResult.alert_summary          || '',
          treatment_appropriateness: llmResult.treatment_appropriateness || '',
          interaction_alert:         llmResult.interaction_alert      || '',
          contraindication_alert:    llmResult.contraindication_alert || '',
          adr_warning:               llmResult.adr_warning            || '',
          recommended_action:        llmResult.recommended_action     || '',
          alternatives:              llmResult.alternatives           || '',
          confidence:                llmResult.confidence             || 'Low',
          confidence_reason:         llmResult.confidence_reason      || '',
          drugs_resolved,
          checked_at:                state.checkedAt,
          llm_model:                 'claude-haiku-4-5-20251001',
          parse_error:               parseError || '',
        };

        console.log(`[${p.patient_id}] Claude assessment complete — alert_level: ${assessment.alert_level}`);
        return { ...state, assessment };
      });
